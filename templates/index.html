<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <title>XYZ University</title>
</head>
<body>

  <div class="bg-shape shape1"></div>
  <div class="bg-shape shape2"></div>
  <div class="bg-shape shape3"></div>

  <header>
    <div class="logo">🎓 XYZ University</div>
    <nav>
      <a href="#">Home</a>
      <a href="#">Notes</a>
      <a href="#">Lectures</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <main class="hero">

    <section class="left">
      <p class="tag">Student Learning Portal</p>
      <h1>Hi Student,<br>Welcome to <span>XYZ University!</span></h1>
      <p class="desc">
        Sign up to access important notes, lectures, study material and resources.
      </p>

      <div class="features">
        <div class="card">📚 Study Notes</div>
        <div class="card">🎥 Video Lectures</div>
        <div class="card">🚀 Career Growth</div>
      </div>
    </section>

    <section class="form-box">
      <h2>Create Account</h2>
      <p>Join your student dashboard</p>

      <form action="/addUser" method="POST">
        <label>Email</label>
        <input type="text" name="email" placeholder="jane@email.com">

        <label>Username</label>
        <input type="text" name="username" placeholder="Jane Doe">

        <label>Password</label>
        <input type="password" name="password" placeholder="Password">

        <button id="formBtn">Create Account →</button>
      </form>
    </section>

  </main>

</body>
</html>
